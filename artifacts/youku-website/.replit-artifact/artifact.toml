kind = "web"
previewPath = "/"
title = "YOUKU Website"
version = "1.0.0"
id = "artifacts/youku-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21179

[services.development]
run = "pnpm --filter @workspace/youku-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youku-website", "run", "build" ]
publicDir = "artifacts/youku-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21179"
BASE_PATH = "/"
